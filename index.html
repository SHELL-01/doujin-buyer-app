<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="同人誌即売会の買い物支援アプリ - オフライン対応PWA">
<meta name="theme-color" content="#6c5ce7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>即売会バイヤー</title>
<style>
/* ===== リセット & ベース ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#25253d;--surface3:#2f2f4a;
  --text:#e8e8f0;--text2:#9898b0;--accent:#6c5ce7;--accent2:#a855f7;
  --green:#00d68f;--red:#ff6b6b;--blue:#4fc3f7;--purple:#b388ff;--orange:#ffb74d;
  --radius:12px;--shadow:0 4px 20px rgba(0,0,0,.3);
  --tab-h:60px;--header-h:56px;
}
html,body{height:100%;font-family:'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-tap-highlight-color:transparent}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:var(--text);background:var(--surface2);border:1px solid var(--surface3);border-radius:8px;padding:10px 12px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}

/* ===== ヘッダー ===== */
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:linear-gradient(135deg,var(--surface),var(--surface2));display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;border-bottom:1px solid var(--surface3)}
.header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .stats{font-size:12px;color:var(--text2)}

/* ===== メインコンテンツ ===== */
.main{position:fixed;top:var(--header-h);bottom:var(--tab-h);left:0;right:0;overflow:hidden}
.view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}
.view.active{display:flex}

/* ===== ボトムタブ ===== */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--surface);display:flex;border-top:1px solid var(--surface3);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--text2);transition:.2s}
.tab-btn.active{color:var(--accent)}
.tab-btn .icon{font-size:22px}

/* ===== リストビュー ===== */
.list-toolbar{padding:10px 12px;display:flex;gap:8px;flex-shrink:0}
.list-toolbar select{width:auto;flex:0 0 auto;padding:8px 10px;font-size:13px}
.list-toolbar .search{flex:1}
.circle-list{flex:1;overflow-y:auto;padding:0 12px 80px}
.circle-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;border-left:4px solid var(--blue);position:relative;transition:transform .15s}
.circle-card.status-bought{border-left-color:var(--green)}
.circle-card.status-soldout{border-left-color:var(--red)}
.circle-card.status-online{border-left-color:var(--purple)}
.circle-card .cc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.circle-card .cc-name{font-size:16px;font-weight:700}
.circle-card .cc-space{font-size:12px;color:var(--accent);background:var(--surface2);padding:2px 8px;border-radius:20px}
.circle-card .cc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.cc-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--text2)}
.cc-tag.new{background:rgba(255,183,77,.15);color:var(--orange)}
.cc-tag.friend{background:rgba(168,85,247,.15);color:var(--accent2)}
.circle-card .cc-item{font-size:13px;color:var(--text2);margin-bottom:8px}
.circle-card .cc-note{font-size:12px;color:var(--text2);font-style:italic}
.status-btns{display:flex;gap:6px;margin-top:8px}
.status-btn{padding:6px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surface2);transition:.2s}
.status-btn.active{color:#fff}
.status-btn[data-s="unbought"].active{background:var(--blue)}
.status-btn[data-s="bought"].active{background:var(--green)}
.status-btn[data-s="soldout"].active{background:var(--red)}
.status-btn[data-s="online"].active{background:var(--purple)}
/* ジャンルタグ */
.cc-tag.genre{background:rgba(79,195,247,.15);color:var(--blue)}
/* ご挨拶タグ */
.cc-tag.greeting{background:rgba(0,214,143,.15);color:var(--green)}

/* ===== FAB ===== */
.fab{position:fixed;bottom:calc(var(--tab-h) + 16px);right:16px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);z-index:90;transition:transform .2s}
.fab:active{transform:scale(.9)}

/* ===== マップビュー ===== */
.map-area-tabs{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.map-area-tabs::-webkit-scrollbar{display:none}
.area-tab{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap;background:var(--surface2);color:var(--text2);transition:.2s;flex-shrink:0}
.area-tab.active{background:var(--accent);color:#fff}
.area-tab .area-count{font-size:10px;margin-left:4px;opacity:.7}
.add-area-btn{padding:8px 14px;border-radius:20px;font-size:18px;background:var(--surface3);color:var(--accent);flex-shrink:0}
.map-container{flex:1;position:relative;overflow:hidden;background:var(--surface);margin:0 12px 12px;border-radius:var(--radius)}
.map-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);gap:12px;padding:20px;text-align:center}
.map-placeholder .icon{font-size:48px;opacity:.5}
.map-placeholder button{background:var(--accent);color:#fff;padding:12px 24px;border-radius:var(--radius);font-weight:600}
.map-img-wrap{width:100%;height:100%;overflow:hidden;touch-action:none;position:relative}
.map-img-wrap img{position:absolute;transform-origin:0 0;max-width:none}
.map-pin{position:absolute;width:28px;height:28px;border-radius:50%;border:3px solid #fff;transform:translate(-50%,-50%);z-index:10;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4);transition:transform .15s}
.map-pin:active{transform:translate(-50%,-50%) scale(1.3)}
.map-pin.status-unbought{background:var(--blue)}
.map-pin.status-bought{background:var(--green)}
.map-pin.status-soldout{background:var(--red)}
.map-pin.status-online{background:var(--purple)}
.map-pin .pin-label{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);white-space:nowrap;background:var(--surface);color:var(--text);font-size:10px;padding:2px 6px;border-radius:4px;pointer-events:none;opacity:0;transition:.15s}
.map-pin:hover .pin-label,.map-pin.show-label .pin-label{opacity:1}
.map-tools{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:8px;z-index:20}
.map-tool-btn{width:40px;height:40px;border-radius:50%;background:var(--surface);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.map-tool-btn.active{background:var(--accent);color:#fff}

/* ===== 設定ビュー ===== */
.settings-view{padding:16px}
.settings-section{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.settings-section h3{font-size:14px;color:var(--accent);margin-bottom:12px}
.settings-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--surface2)}
.settings-item:last-child{border:none}
.settings-item label{font-size:14px}
.danger-btn{background:var(--red);color:#fff;padding:10px 20px;border-radius:var(--radius);font-weight:600;width:100%;margin-top:8px}

/* ===== モーダル ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px 16px calc(20px + env(safe-area-inset-bottom));animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px;text-align:center}
.modal .form-group{margin-bottom:14px}
.modal .form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.modal .form-row{display:flex;gap:10px}
.modal .form-row>*{flex:1}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions button{flex:1;padding:14px;border-radius:var(--radius);font-weight:600;font-size:15px}
.btn-cancel{background:var(--surface2)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-delete{background:var(--red);color:#fff}

/* ===== ピン詳細ポップアップ ===== */
.pin-popup{position:absolute;z-index:30;background:var(--surface);border-radius:var(--radius);padding:12px;min-width:200px;box-shadow:var(--shadow);display:none}
.pin-popup.open{display:block}
.pin-popup .pp-name{font-weight:700;font-size:14px;margin-bottom:4px}
.pin-popup .pp-space{font-size:12px;color:var(--accent);margin-bottom:8px}

/* ===== トースト ===== */
.toast{position:fixed;bottom:calc(var(--tab-h) + 20px);left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- ヘッダー -->
<header class="header">
  <h1>🛒 即売会バイヤー</h1>
  <div class="stats" id="headerStats">0 / 0 購入済み</div>
</header>

<!-- メインコンテンツ -->
<main class="main">
  <!-- リストビュー -->
  <div class="view active" id="listView">
    <div class="list-toolbar">
      <input class="search" type="text" placeholder="🔍 サークル名で検索..." id="searchInput">
      <select id="filterStatus">
        <option value="all">全て</option>
        <option value="unbought">未購入</option>
        <option value="bought">購入済み</option>
        <option value="soldout">売り切れ</option>
        <option value="online">通販</option>
      </select>
      <select id="filterTarget">
        <option value="all">全員</option>
        <option value="self">自分</option>
        <option value="friend">友人</option>
      </select>
      <select id="filterGenre">
        <option value="all">ジャンル</option>
      </select>
    </div>
    <div class="circle-list" id="circleList"></div>
  </div>

  <!-- マップビュー -->
  <div class="view" id="mapView">
    <div class="map-area-tabs" id="areaTabs"></div>
    <div class="map-container" id="mapContainer">
      <div class="map-placeholder" id="mapPlaceholder">
        <div class="icon">🗺️</div>
        <p>エリアを追加して<br>マップ画像を設定しましょう</p>
      </div>
      <div class="map-img-wrap" id="mapImgWrap" style="display:none">
        <img id="mapImg" draggable="false">
      </div>
      <div class="pin-popup" id="pinPopup"></div>
      <div class="map-tools" id="mapTools" style="display:none">
        <button class="map-tool-btn" id="btnPinMode" title="ピン配置モード">📌</button>
        <button class="map-tool-btn" id="btnZoomIn" title="拡大">＋</button>
        <button class="map-tool-btn" id="btnZoomOut" title="縮小">−</button>
        <button class="map-tool-btn" id="btnFitMap" title="全体表示">⊡</button>
      </div>
    </div>
  </div>

  <!-- 設定ビュー -->
  <div class="view settings-view" id="settingsView">
    <div class="settings-section">
      <h3>📊 統計情報</h3>
      <div id="settingsStats"></div>
    </div>
    <div class="settings-section">
      <h3>📦 データ管理</h3>
      <div class="settings-item">
        <label>データをエクスポート</label>
        <button class="btn-primary" style="flex:0;padding:8px 16px;font-size:13px" id="btnExport">保存</button>
      </div>
      <div class="settings-item">
        <label>データをインポート</label>
        <button class="btn-primary" style="flex:0;padding:8px 16px;font-size:13px" id="btnImport">読込</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
    <div class="settings-section">
      <h3>⚠️ 危険ゾーン</h3>
      <button class="danger-btn" id="btnDeleteAll">全データを削除</button>
    </div>
  </div>
</main>

<!-- FAB（サークル追加） -->
<button class="fab" id="fabAdd">＋</button>

<!-- ボトムタブ -->
<nav class="tab-bar">
  <button class="tab-btn active" data-view="listView"><span class="icon">📋</span>リスト</button>
  <button class="tab-btn" data-view="mapView"><span class="icon">🗺️</span>マップ</button>
  <button class="tab-btn" data-view="settingsView"><span class="icon">⚙️</span>設定</button>
</nav>

<!-- サークル追加/編集モーダル -->
<div class="modal-overlay" id="circleModal">
  <div class="modal">
    <h2 id="circleModalTitle">サークルを追加</h2>
    <input type="hidden" id="editCircleId">
    <div class="form-group"><label>サークル名 *</label><input id="fCircleName" placeholder="例: ○○書房"></div>
    <div class="form-row">
      <div class="form-group"><label>スペース番号</label><input id="fSpace" placeholder="例: A-01"></div>
      <div class="form-group"><label>エリア</label><select id="fArea"></select></div>
    </div>
    <div class="form-group"><label>頒布物名</label><input id="fItem" placeholder="例: 新刊セット"></div>
    <div class="form-row">
      <div class="form-group"><label>種別</label>
        <select id="fType"><option value="new">新刊</option><option value="old">既刊</option><option value="greeting">ご挨拶</option></select>
      </div>
      <div class="form-group"><label>対象</label>
        <select id="fTarget"><option value="self">自分用</option><option value="friend">友人分</option></select>
      </div>
    </div>
    <div class="form-group"><label>備考</label><textarea id="fNote" rows="2" placeholder="メモがあれば..."></textarea></div>
    <div class="form-group">
      <label>ジャンル</label>
      <input id="fGenre" list="genreList" placeholder="例: BL・百合・オリジナル…" autocomplete="off">
      <datalist id="genreList"></datalist>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelCircle">キャンセル</button>
      <button class="btn-delete" id="btnDeleteCircle" style="display:none">削除</button>
      <button class="btn-primary" id="btnSaveCircle">保存</button>
    </div>
  </div>
</div>

<!-- エリア追加/編集モーダル -->
<div class="modal-overlay" id="areaModal">
  <div class="modal">
    <h2 id="areaModalTitle">エリアを追加</h2>
    <input type="hidden" id="editAreaId">
    <div class="form-group"><label>エリア名 *</label><input id="fAreaName" placeholder="例: 東1ホール"></div>
    <div class="form-group">
      <label>マップ画像</label>
      <input type="file" id="fAreaMap" accept="image/*">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelArea">キャンセル</button>
      <button class="btn-delete" id="btnDeleteArea" style="display:none">削除</button>
      <button class="btn-primary" id="btnSaveArea">保存</button>
    </div>
  </div>
</div>

<!-- ピン紐付けモーダル -->
<div class="modal-overlay" id="pinLinkModal">
  <div class="modal">
    <h2>ピンをサークルに紐付け</h2>
    <div class="form-group"><label>サークルを選択</label><select id="fPinCircle"></select></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelPin">キャンセル</button>
      <button class="btn-primary" id="btnSavePin">紐付け</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
